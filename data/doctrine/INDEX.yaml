# Doctrine Knowledge Base — Workflow Index
#
# CENTRAL CONCEPT: The 5+2 Aktionsplanungsprozess (BFE 52.080 Kap 5)
#
# 5 Führungstätigkeiten (sequential):
#   1. Problemerfassung — Understand the problem, decompose into sub-tasks
#   2. Beurteilung der Lage (BdL) — AUGEZ factor analysis (Auftrag, Umwelt, Gegner, Eigene, Zeit)
#   3. Entschlussfassung — Generate variants, evaluate, decide, formulate Absicht + Aufträge
#   4. Planentwicklung — Elaborate Besondere Anordnungen, Beilagen, Reserve plans
#   5. Befehlsgebung — Assemble 5-Punkte-Befehl and issue it
#
# +2 Begleitende Tätigkeiten (continuous across all 5 steps):
#   - Sofortmassnahmen (SOMA) — OEBAS-VIV immediate actions
#   - Zeitplanung — Synchronisationsmatrix (internal + external timeline)
#   (Plus Risikomanagement as permanent cross-cutting activity)
#
# The 5+2 is THE universal process. Every workflow below is a specialized
# application of this process. The difference is only WHICH doctrine chapters
# and WHICH skeleton templates are used.

