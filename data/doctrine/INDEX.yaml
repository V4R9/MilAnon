# ============================================================================
# WORKFLOWS — All derived from the 5+2 Prozess
# ============================================================================

workflows:

  # --------------------------------------------------------------------------
  # THE CORE: Full 5+2 Aktionsplanung
  # --------------------------------------------------------------------------
  5+2:
    name: "Aktionsplanungs-Assistent (5+2 Prozess)"
    description: >
      THE universal workflow. Guides the commander through the complete
      Aktionsplanung: Problemerfassung → Sofortmassnahmen → Zeitplanung →
      BdL (AUGEZ) → Entschlussfassung → Planentwicklung → Befehlsgebung.
      Produces ALL intermediate products along the way.
    system_prompt: templates/5+2-aktionsplanung.md
    doctrine:
      - source: 52_080_bfe_einsatz.md
        chapters: ["Kap 5 Aktionsplanung"]  # The entire Chapter 5
      - source: 50_030_taktische_fuehrung.md
        extract: extracts/tf_kap5_grundkenntnisse.md
    skeleton: null  # Dynamic — produces multiple documents
    output_format: [markdown]
    products:
      - "Problemerfassungs-Matrix (Teilprobleme, Prioritäten, Delegation)"
      - "Sofortmassnahmen-Liste (OEBAS-VIV)"
      - "Pendenzen-Liste"
      - "Synchronisationsmatrix (externer + interner Zeitplan)"
      - "AUGEZ-Analyse (Faktorenanalyse)"
      - "Schlüsselbereiche ROT/BLAU"
      - "Konsequenzen ROT → Konsequenzen BLAU"
      - "Varianten (2-3 mit ROS-Unterscheidung)"
      - "Entschluss + Absicht + Aufträge"
      - "Besondere Anordnungen + Beilagen"
      - "5-Punkte-Befehl (Ei Bf Einh)"

  # --------------------------------------------------------------------------
  # DERIVED WORKFLOWS — Specialized 5+2 applications
  # --------------------------------------------------------------------------
  analyse:
    name: "Bat Dossier Analyse"
    description: "Extract all tasks, timeline, conflicts for your unit. Step 1 of the 5+2."
    system_prompt: templates/analyse.md
    doctrine:
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_initialisierung.md
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_problemerfassung.md
    skeleton: null
    output_format: [markdown]
    maps_to_5+2: "Schritt 1: Problemerfassung (Initialisierung)"

  allgemeiner-befehl:
    name: "Allgemeiner Kp Befehl (Dok 000)"
    description: "Complete company order — the final product of a full 5+2 cycle."
    system_prompt: templates/allgemeiner-befehl.md
    doctrine:
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_befehlsschema.md
    skeleton: skeletons/000_allgemeiner_befehl.md
    output_format: [markdown, docx]
    maps_to_5+2: "Schritt 5: Befehlsgebung"

  wachtdienst:
    name: "Wachtdienstbefehl (Dok 300/400)"
    description: "Guard duty order — a 5+2 cycle focused on security at a Standort."
    system_prompt: templates/wachtdienst.md
    doctrine:
      - source: 51_301_wachtdienst_aller_truppen.md
        extract: extracts/wat_wachtdienstbefehl.md
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_befehlsschema.md
    skeleton: skeletons/300_wachtdienstbefehl.md
    output_format: [markdown, docx]
    maps_to_5+2: "Kompletter 5+2 mit Fokus Sicherung"

  einsatzbefehl:
    name: "Kp Einsatzbefehl (Dok 500)"
    description: "Tactical company order — 5+2 cycle with full BdL and Gegner-Analyse."
    system_prompt: templates/einsatzbefehl.md
    doctrine:
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_befehlsschema.md
      - source: 50_030_taktische_fuehrung.md
        extract: extracts/tf_kap5_grundkenntnisse.md
      - source: 53_005_23_ei_verf_inf_kp.md
        extract: null
    skeleton: skeletons/500_einsatzbefehl.md
    output_format: [markdown, docx]
    maps_to_5+2: "Kompletter 5+2 mit taktischem Fokus"

  dienstbetrieb:
    name: "Befehl Dienstbetrieb (Dok 100)"
    description: "Daily operations — 5+2 cycle focused on Dienstbetrieb-Regelung."
    system_prompt: templates/dienstbetrieb.md
    doctrine:
      - source: 52_081_bfe_ausbildung.md
        extract: extracts/bfe_personalplanung.md
    skeleton: skeletons/100_bf_dienstbetrieb.md
    output_format: [markdown, docx]
    maps_to_5+2: "Abgekürzter 5+2 (Problemerfassung → Planentwicklung → Befehl)"

  ausbildung:
    name: "Befehl Ausbildung (Dok 200)"
    description: "Training planning — 5+2 cycle for Lernziele, Lektionen, WAP."
    system_prompt: templates/ausbildung.md
    doctrine:
      - source: 52_081_bfe_ausbildung.md
        extract: extracts/bfe_ausbildungsplanung.md
    skeleton: skeletons/200_bf_ausbildung.md
    output_format: [markdown, xlsx]
    maps_to_5+2: "5+2 mit Ausbildungsfokus"

  aktionsplanung:
    name: "Beurteilung der Lage (BdL)"
    description: "Guided AUGEZ analysis — Step 2 of the 5+2, standalone for tactical problems."
    system_prompt: templates/aktionsplanung.md
    doctrine:
      - source: 52_080_bfe_einsatz.md
        extract: extracts/bfe_fuehrungsprozess.md
      - source: 50_030_taktische_fuehrung.md
        extract: extracts/tf_kap5_grundkenntnisse.md
    skeleton: null
    output_format: [markdown]
    maps_to_5+2: "Schritt 2: Beurteilung der Lage (isoliert)"

  personalplanung:
    name: "Personalplanung"
    description: "Personnel management — simplified 5+2 for TDL, Entlassungen, Aufgebote."
    system_prompt: templates/personalplanung.md
    doctrine:
      - source: 52_081_bfe_ausbildung.md
        extract: extracts/bfe_personalplanung.md
    skeleton: null
    output_format: [markdown, xlsx]
    maps_to_5+2: "Abgekürzter 5+2 für administrative Aufgaben"

  rapport:
    name: "Rapport-Vorbereitung"
    description: "Prepare Frontrapport, Bat Rap input from current Kp data."
    system_prompt: templates/rapport.md
    doctrine:
      - source: 52_081_bfe_ausbildung.md
        extract: null
    skeleton: null
    output_format: [markdown]
    maps_to_5+2: "Lageverfolgung → Einsatzbericht"
